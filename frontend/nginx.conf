server {
    listen 80;

    # Serve the Vue app's static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Support Vue Router's history mode by falling back to index.html
        try_files $uri $uri/ /index.html;
    }

    # Proxy menu API requests to the Go Menu Service
    location /api/menu {
        proxy_pass http://menu-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Content-Length $content_length;
    }

    # Proxy chat and health requests to the Python AI Service
    location /api/chat {
        proxy_pass http://ai-service:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Content-Length $content_length;
    }

    location /api/health {
        proxy_pass http://ai-service:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
